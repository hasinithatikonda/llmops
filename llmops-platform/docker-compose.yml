version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: llmops_postgres
    environment:
      POSTGRES_DB: llmops_db
      POSTGRES_USER: llmops_user
      POSTGRES_PASSWORD: llmops_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops_user -d llmops_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llmops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llmops_backend
    environment:
      DATABASE_URL: postgresql://llmops_user:llmops_password@postgres:5432/llmops_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/chroma_db:/app/chroma_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llmops_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
